    Get-Org-Vm-Spec:
      method: get
      resourcePath: /vmorgspec/{Name}
      description: Retrieve details of a specific Original VM Spec.
    List-All-Key:
      method: get
      resourcePath: /allkeypair
      description: Retrieve a comprehensive list of all KeyPairs associated with a
