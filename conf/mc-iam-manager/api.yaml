    Get-Securitygroup:
      method: get
      resourcePath: /securitygroup/{Name}
      description: Retrieve details of a specific Security Group.
    Delete-Securitygroup:
      method: delete
      resourcePath: /securitygroup/{Name}
      description: Delete a specified Security Group.
    Terminate-Vm:
      method: delete
