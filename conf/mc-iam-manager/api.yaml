    List-Cluster:
      method: get
      resourcePath: /cluster
      description: Retrieve a list of Clusters associated with a specific connection.
    Create-Cluster:
      method: post
      resourcePath: /cluster
      description: 'Create a new Cluster with specified configurations. 🕷️ [[Concept
