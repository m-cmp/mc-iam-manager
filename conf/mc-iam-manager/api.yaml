        <br> * NodeGroupList is optional, depends on CSP type: <br> &nbsp;- Type-I
        (e.g., Tencent, Alibaba): requires separate Node Group addition after Cluster
        creation. <br> &nbsp;- Type-II (e.g., Azure, NHN): mandates at least one Node
