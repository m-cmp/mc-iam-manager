# Nginx configuration for MC-IAM Manager — Local PC HTTP mode (no TLS)
# Generated by 0_preset_local.sh
# Use nginx.template.conf for dev/prod HTTPS modes.

worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;

    # Main entry: IAM + Keycloak on HTTP port 80
    server {
        listen 80;
        server_name ${MC_IAM_MANAGER_PUBLIC_DOMAIN};

        location /nginx-health {
            access_log off;
            return 200 "nginx is healthy\n";
            add_header Content-Type text/plain;
        }

        location /health {
            resolver 127.0.0.11 valid=10s;
            set $upstream_iam ${MC_IAM_MANAGER_DOMAIN};
            proxy_pass http://$upstream_iam:${MC_IAM_MANAGER_PORT}/readyz;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;

            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        location /auth/ {
            resolver 127.0.0.11 valid=10s;
            set $upstream_kc ${MC_IAM_MANAGER_KEYCLOAK_DOMAIN};
            proxy_pass http://$upstream_kc:${MC_IAM_MANAGER_KEYCLOAK_PORT}/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;

            proxy_hide_header X-Frame-Options;
            add_header X-Frame-Options "SAMEORIGIN" always;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream_iam ${MC_IAM_MANAGER_DOMAIN};
            proxy_pass http://$upstream_iam:${MC_IAM_MANAGER_PORT};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # mc-web-console-front HTTP proxy
    server {
        listen 3001;
        server_name ${MC_IAM_MANAGER_PUBLIC_DOMAIN};

        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream_console mc-web-console-front;
            proxy_pass http://$upstream_console:3001$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # mc-observability-grafana HTTP proxy (for iframe)
    server {
        listen ${MC_OBSERVABILITY_GRAFANA_PROXY_PORT};
        server_name ${MC_IAM_MANAGER_PUBLIC_DOMAIN};

        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream_grafana mc-observability-grafana;
            proxy_pass http://$upstream_grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header X-Frame-Options;
            add_header X-Frame-Options "SAMEORIGIN" always;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # mc-cost-optimizer-be HTTP proxy
    server {
        listen ${MC_COST_OPTIMIZER_BE_PORT};
        server_name ${MC_IAM_MANAGER_PUBLIC_DOMAIN};

        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream_cost_be mc-cost-optimizer-be;
            proxy_pass http://$upstream_cost_be:9090;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # mc-cost-optimizer-alarm HTTP proxy
    server {
        listen ${MC_COST_OPTIMIZER_ALARM_PORT};
        server_name ${MC_IAM_MANAGER_PUBLIC_DOMAIN};

        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream_cost_alarm mc-cost-optimizer-alarm-service;
            proxy_pass http://$upstream_cost_alarm:9000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # mc-workflow-manager HTTP proxy (for iframe)
    server {
        listen ${MC_WORKFLOW_MANAGER_PROXY_PORT};
        server_name ${MC_IAM_MANAGER_PUBLIC_DOMAIN};

        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream_wf mc-workflow-manager;
            proxy_pass http://$upstream_wf:18083;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors http://${MC_IAM_MANAGER_PUBLIC_DOMAIN}:3001 http://${MC_IAM_MANAGER_PUBLIC_DOMAIN}" always;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # mc-data-manager HTTP proxy (for iframe)
    server {
        listen ${MC_DATA_MANAGER_PROXY_PORT};
        server_name ${MC_IAM_MANAGER_PUBLIC_DOMAIN};

        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream_dm mc-data-manager;
            proxy_pass http://$upstream_dm:3300;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors http://${MC_IAM_MANAGER_PUBLIC_DOMAIN}:3001 http://${MC_IAM_MANAGER_PUBLIC_DOMAIN}" always;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # mc-application-manager HTTP proxy (for iframe)
    server {
        listen ${MC_APPLICATION_MANAGER_PROXY_PORT};
        server_name ${MC_IAM_MANAGER_PUBLIC_DOMAIN};

        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream_am mc-application-manager;
            proxy_pass http://$upstream_am:18084;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors http://${MC_IAM_MANAGER_PUBLIC_DOMAIN}:3001 http://${MC_IAM_MANAGER_PUBLIC_DOMAIN}" always;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # mc-cost-optimizer-fe HTTP proxy (for iframe)
    server {
        listen ${MC_COST_OPTIMIZER_FE_PROXY_PORT};
        server_name ${MC_IAM_MANAGER_PUBLIC_DOMAIN};

        location / {
            resolver 127.0.0.11 valid=10s;
            set $upstream_cost_fe mc-cost-optimizer-fe;
            proxy_pass http://$upstream_cost_fe:80;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors http://${MC_IAM_MANAGER_PUBLIC_DOMAIN}:3001 http://${MC_IAM_MANAGER_PUBLIC_DOMAIN}" always;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
